{% extends "dashboard/layouts/base_dashboard.html" %}

{% block content %}
<main class="content">
    <div class="container-fluid p-0">

        <div class="mb-3 d-flex justify-content-between align-items-center">
            <h1 class="h3 mb-3"><strong>Detail</strong> Foto Gallery</h1>
            <a href="{% url 'dashboard:list_gallery' %}" class="btn btn-secondary btn-sm">
                <i data-feather="arrow-left"></i> Kembali
            </a>
        </div>

        <div class="row">
            <div class="col-12 col-md-8 mx-auto">
                <div class="card shadow-sm">
                    <div class="card-body text-center p-4">
                        <img src="{{ photo.image.url }}" class="img-fluid rounded shadow" alt="{{ photo.title }}" style="max-height: 500px;">
                        <div class="mt-4">
                            <h4 class="fw-bold">{{ photo.title }}</h4>
                            <span class="badge bg-info mb-3">{{ photo.category.name }}</span>
                            <p class="text-muted small">Diunggah pada: {{ photo.created_at|date:"d F Y, H:i" }} WIB</p>
                        </div>
                        <hr>
                        <div class="d-flex justify-content-center gap-2">
                            <a href="{% url 'dashboard:edit_gallery' photo.id %}" class="btn btn-primary">
                                <i data-feather="edit-2"></i> Edit Foto
                            </a>
                            <form action="{% url 'dashboard:delete_gallery' photo.id %}" method="POST" onsubmit="return confirm('Yakin ingin menghapus foto ini?')">
                                {% csrf_token %}
                                <button type="submit" class="btn btn-danger">
                                    <i data-feather="trash"></i> Hapus
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>
</main>
{% endblock content %}
