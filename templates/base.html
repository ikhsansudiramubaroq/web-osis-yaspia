{% load static %}

<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Website Resmi OSIS SMK - Informasi Kegiatan, Berita, dan Galeri"
    />
    <title>{% block title %}OSIS SMK - Beranda{% endblock title %}</title>

    {% block meta %}
    <meta name="description" content="Website Resmi OSIS SMK Yaspia Jakarta. Temukan informasi kegiatan, agenda terbaru, dan galeri siswa di sini." />
    
    <meta property="og:type" content="website" />
    <meta property="og:title" content="OSIS SMK Yaspia - Beranda" />
    <meta property="og:description" content="Website Resmi OSIS SMK Yaspia - Informasi Kegiatan, Berita, dan Galeri" />
    <meta property="og:image" content="{{ request.scheme }}://{{ request.get_host }}{% static 'dashboard/img/logo-yaspia.jpeg' %}" />
    <meta property="og:url" content="{{ request.build_absolute_uri }}" />
    {% endblock meta %}

    <!-- Bootstrap 5.3 CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Swiper CSS -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.css"
    />

    <!-- AOS CSS -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />

    <!-- Google Fonts - Poppins -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"
    />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}" />
     <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  </head>

  <body>
    
    {% block 'content' %}{% endblock 'content' %}
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // Nyuruh JS nunggu sampai seluruh halaman HTML selesai di-load
        document.addEventListener("DOMContentLoaded", function() {
            
            // Cek dulu, apakah div id="map" benar-benar ada di halaman ini?
            var mapElement = document.getElementById('map');
            
            // Kalau elemennya KETEMU, baru deh kita bangun petanya
            if (mapElement !== null) {
                var lat = {{ contact.latitude|default:0 }};
                var lon = {{ contact.longitude|default:0 }};
                
                var map = L.map('map').setView([lat, lon], 15);

                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    attribution: '© OpenStreetMap'
                }).addTo(map);

                L.marker([lat, lon]).addTo(map)
                    .bindPopup('SMK Yaspia Bogor')
                    .openPopup();
            }
        });
    </script>

    <!-- Swiper JS -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.js"></script>

    <!-- AOS JS -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

    <!-- Custom JS -->
    <script src="{% static 'js/script.js' %}"></script>
  </body>
</html>
