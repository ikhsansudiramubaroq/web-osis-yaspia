{% load static %}

<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Website Resmi OSIS SMK - Informasi Kegiatan, Berita, dan Galeri"
    />
    <title>{% block title %}OSIS SMK - Beranda{% endblock title %}</title>

    {% block meta %}
    <meta name="description" content="Website Resmi OSIS SMK Yaspia Jakarta. Temukan informasi kegiatan, agenda terbaru, dan galeri siswa di sini." />
    
    <meta property="og:type" content="website" />
    <meta property="og:title" content="OSIS SMK Yaspia - Beranda" />
    <meta property="og:description" content="Website Resmi OSIS SMK Yaspia - Informasi Kegiatan, Berita, dan Galeri" />
    <meta property="og:image" content="{{ request.scheme }}://{{ request.get_host }}{% static 'dashboard/img/logo-yaspia.jpeg' %}" />
    <meta property="og:url" content="{{ request.build_absolute_uri }}" />
    {% endblock meta %}

    <!-- Preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link rel="preconnect" href="https://unpkg.com" crossorigin>

    <!-- Bootstrap 5.3 CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- AOS CSS -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />

    <!-- Google Fonts - Poppins -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"
    />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    {% block extra_css %}{% endblock extra_css %}
  </head>

  <body>
    
    {% block 'content' %}{% endblock 'content' %}
    
    <!-- Bootstrap JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" defer></script>


    <script>
    document.addEventListener("DOMContentLoaded", function() {
        var mapElement = document.getElementById('map');
        
        if (mapElement !== null) {
            // SOLUSI: Pakai kutip dan filter safe + floatformat agar angka selalu pakai titik (.)
            var lat = parseFloat("{{ contact.latitude|default:'0'|safe }}".replace(',', '.'));
            var lon = parseFloat("{{ contact.longitude|default:'0'|safe }}".replace(',', '.'));

            console.log("Koordinat Terdeteksi:", lat, lon); // Cek di console F12

            if (lat !== 0 && lon !== 0) {
                var map = L.map('map').setView([lat, lon], 15);

                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    attribution: '© OpenStreetMap'
                }).addTo(map);

                var myIcon = L.icon({
                    // GUNAKAN TAG STATIC AGAR PATH-NYA BENAR DI MODE PRODUCTION
                    iconUrl: "{% static 'dashboard/img/logo-yaspia-marker.webp' %}", 
                    iconSize: [50, 50],
                    iconAnchor: [25, 50],
                    popupAnchor: [0, -45],
                    className: 'rounded-circle shadow-sm border border-white'
                });

                L.marker([lat, lon], { icon: myIcon }).addTo(map)
                    .bindPopup('<b>SMK Yaspia Jakarta</b><br>Lokasi Sekolah Kami')
                    .openPopup();
                
                // Tambahkan ini agar peta merender ulang jika z-index bermasalah
                setTimeout(function(){ map.invalidateSize()}, 500);
            }
        }
    });
</script>



    <!-- AOS JS -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js" defer></script>

    <!-- Custom JS -->
    <script src="{% static 'js/script.js' %}" defer></script>
    
    {% block extra_js %}{% endblock extra_js %}
  </body>
</html>
